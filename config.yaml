telemetry:
  serviceName: manifold

  trace:
    enabled: true
    grpc:
      addr: localhost:4317

  metrics:
    enabled: true
    exporterType: push
    grpc:
      addr: localhost:4317

  logs:
    enabled: true
    grpc:
      addr: localhost:4317
